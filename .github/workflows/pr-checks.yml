name: PR checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:9.1
        env:
          MYSQL_ROOT_PASSWORD: kcas_test_root
          MYSQL_DATABASE: kcas_blazor_test
          MYSQL_USER: kcas_blazor
          MYSQL_PASSWORD: kcas_test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pkcas_test_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      KCAS_TEST_CONNECTION_STRING: server=127.0.0.1;port=3306;database=kcas_blazor_test;user=root;password=kcas_test_root;TreatTinyAsBoolean=true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore KCAS.slnx

      - name: Build
        run: dotnet build KCAS.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test KCAS.slnx --configuration Release --no-build --verbosity normal

      - name: Validate Windows deployment scripts
        shell: pwsh
        run: |
          $scripts = Get-ChildItem deploy/windows -Filter '*.ps1'
          $failed = $false
          foreach ($script in $scripts) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$null, [ref]$errors) | Out-Null
            foreach ($parseError in $errors) {
              Write-Error "$($script.Name): $($parseError.Message)" -ErrorAction Continue
              $failed = $true
            }
          }
          if ($failed) { throw 'One or more Windows deployment scripts have syntax errors.' }
          @(
            'deploy/windows/Deploy-KCAS.bat',
            'deploy/windows/Deploy-KCAS.ps1',
            'deploy/windows/Deploy-KCAS-Release.ps1',
            'deploy/windows/Install-KCAS-Deployment.bat',
            'deploy/windows/Install-KCAS-Deployment.ps1',
            'deploy/windows/Rollback-KCAS-Release.ps1'
          ) | ForEach-Object {
            if (-not (Test-Path -LiteralPath $_ -PathType Leaf)) { throw "Required deployment tool is missing: $_" }
          }
